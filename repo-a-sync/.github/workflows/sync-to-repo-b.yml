name: Sync Obsidian Repo A to Hexo Repo B

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        env:
          REPO_B_OWNER: ${{ secrets.REPO_B_OWNER }}
          REPO_B_NAME: ${{ secrets.REPO_B_NAME }}
          REPO_B_BRANCH: ${{ secrets.REPO_B_BRANCH }}
          REPO_B_SYNC_TOKEN: ${{ secrets.REPO_B_SYNC_TOKEN }}
        run: npm run sync
