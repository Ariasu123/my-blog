navbar:
  blog_title: my-blog
  ground_glass:
    enable: true
    px: 6
    alpha: 0.8
  menu:
    - { key: "home", name: "首页", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "category", name: "分类", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", name: "标签", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "projects", name: "项目", link: "/projects/", icon: "iconfont icon-link-fill" }
    - { key: "about", name: "关于", link: "/about/", icon: "iconfont icon-user-fill" }

index:
  banner_img: /assets/images/default-banner.svg
  banner_img_height: 72
  banner_mask_alpha: 0.25
  slogan:
    enable: true
    text: 记录技术、项目与思考
  auto_excerpt:
    enable: true
  post_meta:
    date: true
    category: true
    tag: true

post:
  banner_img: /assets/images/default-banner.svg
  banner_img_height: 65
  banner_mask_alpha: 0.25
  default_index_img: /assets/images/default-cover.svg
  meta:
    date:
      enable: true
      format: YYYY-MM-DD
    category:
      enable: true
    tag:
      enable: true
    wordcount:
      enable: true
      format: '{} 字'
    min2read:
      enable: true
      awl: 2
      wpm: 60
      format: '{} 分钟'

about:
  enable: true
  banner_img: /assets/images/default-banner.svg
  banner_img_height: 55
  avatar: /assets/images/avatar.svg
  name: Lenovo
  intro: 记录技术、项目与个人实践
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/Ariasu123", tip: "GitHub" }

page:
  banner_img: /assets/images/default-banner.svg
  banner_img_height: 45
  banner_mask_alpha: 0.2

search:
  enable: true
  path: /search.xml
  generate_path: /local-search.xml
  field: post
  content: true

dark_mode:
  enable: true
  default: light

color:
  body_bg_color: '#f8fafc'
  body_bg_color_dark: '#111827'
  navbar_bg_color: '#ffffffcc'
  navbar_bg_color_dark: '#111827cc'
  navbar_text_color: '#0f172a'
  navbar_text_color_dark: '#e5e7eb'
  text_color: '#334155'
  text_color_dark: '#cbd5e1'
  sec_text_color: '#64748b'
  sec_text_color_dark: '#94a3b8'
  board_color: '#ffffff'
  board_color_dark: '#1f2937'
  post_text_color: '#1e293b'
  post_text_color_dark: '#e2e8f0'
  post_heading_color: '#0f172a'
  post_heading_color_dark: '#f8fafc'
  post_link_color: '#2563eb'
  post_link_color_dark: '#60a5fa'
  link_hover_color: '#1d4ed8'
  link_hover_color_dark: '#93c5fd'

fun_features:
  typing:
    enable: false

custom_css:
  - /assets/css/custom.css
