navbar:
  blog_title: Ariasu Blog
  ground_glass:
    enable: true
    px: 6
    alpha: 0.8
  menu:
    - { key: "home", name: "首页", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", name: "归档", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", name: "分类", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", name: "标签", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "projects", name: "项目", link: "/projects/", icon: "iconfont icon-link-fill" }
    - { key: "about", name: "关于", link: "/about/", icon: "iconfont icon-user-fill" }

index:
  banner_img: /assets/images/default-banner.svg
  banner_img_height: 36
  banner_mask_alpha: 0.25
  slogan:
    enable: false
  auto_excerpt:
    enable: true
  post_meta:
    date: true
    category: true
    tag: true

post:
  banner_img: /assets/images/about-banner.jpg
  default_index_img: /assets/images/default-cover.svg
  banner_img_height: 42
  banner_mask_alpha: 0.35
  math:
    enable: false
  meta:
    date:
      enable: true
      format: YYYY-MM-DD
    category:
      enable: true
    tag:
      enable: true
    wordcount:
      enable: true
      format: '{} 字'
    min2read:
      enable: true
      awl: 2
      wpm: 60
      format: '{} 分钟'

about:
  enable: true
  banner_img: /assets/images/about-banner.svg
  banner_img_height: 40
  avatar: /assets/images/my-avatar.jpg
  name: Ariasu
  intro: AI Infra / 系统优化 / 知识沉淀
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/Ariasu123", tip: "GitHub" }
    - { class: "iconfont icon-mail-fill", link: "mailto:ariasu_jtle@163.com", tip: "Email" }

category:
  banner_img: /assets/images/categories-banner.svg
  banner_img_height: 36
  banner_mask_alpha: 0.2

archive:
  banner_img: /assets/images/default-banner.svg
  banner_img_height: 36
  banner_mask_alpha: 0.2

tag:
  banner_img: /assets/images/tags-banner.svg
  banner_img_height: 36
  banner_mask_alpha: 0.2

page:
  banner_img: /assets/images/default-banner.svg
  banner_img_height: 32
  banner_mask_alpha: 0.2

search:
  enable: true
  path: /search.xml
  generate_path: /local-search.xml
  field: post
  content: true

dark_mode:
  enable: true
  default: dark

color:
  body_bg_color: '#f6f7fb'
  body_bg_color_dark: '#0a0e1a'
  navbar_bg_color: '#ffffffd9'
  navbar_bg_color_dark: '#0d1426cc'
  navbar_text_color: '#1e2440'
  navbar_text_color_dark: '#dbe2f4'
  text_color: '#3a415c'
  text_color_dark: '#aab4d4'
  sec_text_color: '#6b7390'
  sec_text_color_dark: '#7c88a8'
  board_color: '#ffffff'
  board_color_dark: '#10162b'
  post_text_color: '#2b3252'
  post_text_color_dark: '#d6dcf0'
  post_heading_color: '#171c33'
  post_heading_color_dark: '#f1f4ff'
  post_link_color: '#4f46e5'
  post_link_color_dark: '#818cf8'
  link_hover_color: '#6366f1'
  link_hover_color_dark: '#a5b4fc'

fun_features:
  typing:
    enable: false

custom_css:
  - /assets/css/custom.css

custom_js:
  - /assets/js/portfolio.js
